{% extends "base.html" %}
{% load static %}

{% block content %}
  <div class="d-flex align-items-center justify-content-between mb-3">
    <div>
      <h1 class="h3 mb-1">Analytics</h1>
      <p class="text-secondary mb-0">Interactive age distribution by patient and scan attributes</p>
    </div>
  </div>

  <div class="card card-body mb-3">
    <div class="row g-3">
      <div class="col-md-4">
        <label for="sex-filter" class="form-label">Sex</label>
        <select id="sex-filter" class="form-select">
          <option value="">All</option>
          {% for value, label in sex_choices %}
            <option value="{{ value }}">{{ label }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
  </div>

  <div class="card card-body">
    <div id="age-chart" data-url="{% url 'age_distribution_data' %}"></div>
  </div>
{% endblock %}

{% block scripts %}
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="{% static 'js/analytics.js' %}"></script>
{% endblock %}
