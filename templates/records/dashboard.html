{% extends "base.html" %}

{% block content %}
  <div class="d-flex align-items-center justify-content-between mb-4">
    <div>
      <h1 class="h3 mb-1">Dashboard</h1>
      <p class="text-secondary mb-0">Clinical records overview</p>
    </div>
    <a href="{% url 'patient_create' %}" class="btn btn-primary">Add patient</a>
  </div>

  <div class="row g-3">
    <div class="col-md-4">
      <div class="card card-body">
        <div class="text-secondary small">Patients</div>
        <div class="display-6">{{ patient_count }}</div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card card-body">
        <div class="text-secondary small">Scans</div>
        <div class="display-6">{{ scan_count }}</div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card card-body">
        <div class="text-secondary small">Clinicians</div>
        <div class="display-6">{{ clinician_count }}</div>
      </div>
    </div>
  </div>
{% endblock %}
