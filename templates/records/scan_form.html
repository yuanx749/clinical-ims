{% extends "base.html" %}

{% block content %}
  <h1 class="h3 mb-1">{{ title }}</h1>
  <p class="text-secondary">Patient: {{ patient }}</p>
  <form method="post" enctype="multipart/form-data" class="card card-body">
    {% csrf_token %}
    {% include "records/form_errors.html" %}
    <div class="row g-3">
      {% for field in form %}
        <div class="col-md-6">
          <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
          {{ field }}
          {% for error in field.errors %}<div class="invalid-feedback d-block">{{ error }}</div>{% endfor %}
        </div>
      {% endfor %}
    </div>
    <div class="mt-3 d-flex gap-2">
      <button type="submit" class="btn btn-primary">Save</button>
      <a href="{% if scan %}{% url 'scan_detail' scan.id %}{% else %}{% url 'patient_detail' patient.id %}{% endif %}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
{% endblock %}
